<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes | Clarisa Rojas Fotografia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"><div class="brand">Clarisa Rojas Fotografia</div><nav class="nav"><a href="dashboard.html">Dashboard</a><a class="active" href="clients.html">Clientes</a><a href="jobs.html">Trabajos</a><a href="packages.html">Paquetes</a><a href="follow-ups.html">Seguimiento escuelas</a><button data-logout type="button">Cerrar sesión</button></nav></aside>
    <main class="main">
      <section class="container">
        <div class="page-header"><h1 class="page-title">Clientes</h1><button id="newClientBtn" class="btn btn-primary" type="button" onclick="window.openClientFormFallback && window.openClientFormFallback()">Nuevo cliente</button></div>
        <div class="card">
          <div class="filters">
            <input id="searchInput" class="input" placeholder="Buscar por nombre, teléfono o correo">
            <select id="typeFilter" class="select"><option value="">Todos</option><option value="PHOTO_SESSION">Sesión de fotos</option><option value="SCHOOL_GRADUATION">Graduación escolar</option></select>
            <select id="activeFilter" class="select"><option value="true">Activos</option><option value="">Todos</option><option value="false">Inactivos</option></select>
          </div>
          <div id="clientsTable" class="table-wrap"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="clientModal" class="modal hidden"><div class="modal-content"><div class="page-header"><h2 id="clientModalTitle">Cliente</h2><button class="btn" data-close-modal type="button">Cerrar</button></div><form id="clientForm"></form></div></div>
  <script>
    window.photoAdminClientsModuleReady = false;
    window.openClientFormFallback = function () {
      if (window.photoAdminClientsModuleReady) return;
      var modal = document.getElementById("clientModal");
      var form = document.getElementById("clientForm");
      document.getElementById("clientModalTitle").textContent = "Nuevo cliente";
      form.innerHTML = [
        '<div class="alert alert-warning">El formulario abrió en modo básico. Para guardar en Supabase abra la app con un servidor local, no con doble clic al archivo HTML.</div>',
        '<div class="form-grid">',
        '<div class="form-group"><label>Tipo de cliente</label><select class="select" name="client_type" required><option value="PHOTO_SESSION">Sesión de fotos</option><option value="SCHOOL_GRADUATION">Graduación escolar</option></select></div>',
        '<div class="form-group"><label>Nombre</label><input class="input" name="name" required></div>',
        '<div class="form-group"><label>Teléfono principal</label><input class="input" name="phone" required></div>',
        '<div class="form-group"><label>Email</label><input class="input" type="email" name="email"></div>',
        '<div class="form-group"><label>Nivel escolar</label><select class="select" name="school_level"><option value="">Seleccione</option><option value="KINDER">Kinder</option><option value="PRIMARY">Primaria</option><option value="SECONDARY">Secundaria</option></select></div>',
        '</div>',
        '<div class="form-group"><label>Notas</label><textarea class="textarea" name="notes"></textarea></div>',
        '<button class="btn btn-primary" type="button" onclick="alert(\\'Para guardar clientes necesita abrir http://localhost:5500/clients.html y tener Supabase configurado.\\')">Guardar cliente</button>'
      ].join("");
      modal.classList.remove("hidden");
    };
    document.getElementById("newClientBtn").addEventListener("click", window.openClientFormFallback);
    document.addEventListener("click", function (event) {
      if (event.target.matches("[data-close-modal]")) {
        document.getElementById("clientModal").classList.add("hidden");
      }
    });
  </script>
  <script type="module" src="js/clients.js"></script>
</body>
</html>
