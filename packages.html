<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paquetes | Clarisa Rojas Fotografia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"><div class="brand">Clarisa Rojas Fotografia</div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="clients.html">Clientes</a><a href="jobs.html">Trabajos</a><a class="active" href="packages.html">Paquetes</a><a href="follow-ups.html">Seguimiento escuelas</a><button data-logout type="button">Cerrar sesión</button></nav></aside>
    <main class="main">
      <section class="container">
        <div class="page-header"><h1 class="page-title">Paquetes</h1><button id="newPackageBtn" class="btn btn-primary">Nuevo paquete</button></div>
        <div class="card">
          <div class="filters">
            <input id="searchInput" class="input" placeholder="Buscar paquete">
            <select id="typeFilter" class="select"><option value="">Todos</option><option value="GENERAL">General</option><option value="PHOTO_SESSION">Sesión de fotos</option><option value="SCHOOL_GRADUATION">Graduación escolar</option></select>
            <select id="activeFilter" class="select"><option value="true">Activos</option><option value="">Todos</option><option value="false">Inactivos</option></select>
          </div>
          <div id="packagesTable" class="table-wrap"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="packageModal" class="modal hidden"><div class="modal-content"><div class="page-header"><h2 id="packageModalTitle">Paquete</h2><button class="btn" data-close-modal>Cerrar</button></div><form id="packageForm"></form></div></div>
  <script type="module" src="js/packages.js"></script>
</body>
</html>
