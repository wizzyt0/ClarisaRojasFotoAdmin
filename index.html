<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clarisa Rojas Fotografia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <main class="card login-card">
    <h1>Clarisa Rojas Fotografia</h1>
    <p class="muted">Ingrese con su usuario administrador.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo</label>
        <input class="input" id="email" name="email" type="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input class="input" id="password" name="password" type="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit">Iniciar sesión</button>
    </form>
  </main>
  <script type="module">
    import { initLoginPage } from "./js/auth.js";
    initLoginPage();
  </script>
</body>
</html>
